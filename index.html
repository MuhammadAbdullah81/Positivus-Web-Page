<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/pages/home.css">
    <title>Positivus</title>
</head>

<body>
    <!-- Header -->
    <header class="py-1_5">
        <!-- Header Content Wrapper -->
        <div class="content-wrapper flex justify-space-bw items-center">
            <!-- Logo -->
            <a href="#">
                <img src="./images/Logo-main/Logo-dark.svg" alt="Positivus">
            </a>
            <!-- Nav Links -->
            <nav>
                <ul class="flex items-center gap-2">
                    <li>
                        <a href="#" class="nav-link lead">About Us</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link lead">Services</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link lead">Use Cases</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link lead">Pricing</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link lead">Blog</a>
                    </li>
                    <li>
                        <button class="btn-light">
                            Request a quote
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero-section">
            <!-- Hero Section Content Wrapper -->
            <div class="content-wrapper my-1_5 flex justify-space-bw items-start">
                <!-- Hero Column 1 -->
                <div class="hero-column">
                    <h1 class="heading-primary">
                        Navigating the <br> digital landscape <br> for success
                    </h1>
                    <p class="lead my-3">
                        Our digital marketing agency helps businesses <br> 
                        grow and succeed online through a range of <br>
                        services including SEO, PPC, social media marketing, <br>
                        and content creation.
                    </p>
                    <button class="btn-dark">
                        Book a consultation
                    </button>
                </div>
                <!-- Hero Column 2 -->
                <div class="hero-column">
                    <img class="hero-img" src="./images/Hero-img/hero-img.svg" alt="Positivus Hero Section">
                </div>
            </div>
        </section>
    </main>
</body>

</html>
